<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            text-align: center;
        }

        h1 {
            background-color: #333;
            color: white;
            padding: 15px;
            margin: 0;
        }

        .container {
            padding: 20px;
        }

        img {
            width: 100%;
            max-width: 800px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        p {
            font-size: 18px;
            color: #333;
            max-width: 800px;
            margin: 20px auto;
        }
    </style>
</head>

<body>

    <h1>Pandharpur Temple</h1>

    <div class="container">
        <img src="images/pandharpur.jpg" alt="Pandharpur Temple">

        <p>
            This is a beautiful view of Pandharpur Temple, one of the most important pilgrimage 
            places in Maharashtra. It is dedicated to Lord Vitthal and attracts thousands of 
            devotees every year.
        </p>
    </div>

</body>
</html>
